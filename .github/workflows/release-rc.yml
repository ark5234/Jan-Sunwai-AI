name: Release RC

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create locally (for dry runs use workflow_dispatch without push)'
        required: false
        default: 'v1.0-rc1'

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: backend
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        env:
          CI_LIGHT: '1'
          MONGODB_URL: mongodb://localhost:27017
          JWT_SECRET_KEY: rc-secret
        run: python -m pytest backend/tests -q

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install and build frontend
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run build

  publish-release:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
